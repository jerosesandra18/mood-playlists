<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Playlists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans pb-12">

    <!-- SCREEN 1: SPLASH SELECTION SCREEN -->
    <div id="splash-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-4 bg-clip-text text-transparent bg-gradient-to-r from-amber-400 via-pink-400 to-indigo-400">
                Mood Playlists
            </h1>
            <p class="text-slate-400 text-lg">Pick a dynamic vibe to open your interactive soundtrack portal</p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 w-full max-w-4xl px-4">
            <!-- Bollywood Card -->
            <button onclick="switchMood('bollywood')" class="group relative h-64 overflow-hidden rounded-2xl border border-amber-500/20 bg-gradient-to-br from-amber-950/40 to-stone-900 p-8 text-left transition-all duration-300 hover:border-amber-400 hover:shadow-[0_0_30px_rgba(245,158,11,0.2)]">
                <h2 class="text-3xl font-bold text-amber-400 mb-2">Y2K Bollywood Romance</h2>
                <p class="text-amber-100/70">Nostalgic acoustic strings, midnight raindrops, and raw lyrical poetry.</p>
                <span class="absolute bottom-6 left-8 text-sm font-semibold text-amber-500">Enter Portal →</span>
            </button>

            <!-- Hollywood Card -->
            <button onclick="switchMood('hollywood')" class="group relative h-64 overflow-hidden rounded-2xl border border-pink-500/20 bg-gradient-to-br from-indigo-950/40 to-slate-900 p-8 text-left transition-all duration-300 hover:border-pink-400 hover:shadow-[0_0_30px_rgba(236,72,153,0.2)]">
                <h2 class="text-3xl font-bold text-pink-400 mb-2">2012 Hollywood Pop</h2>
                <p class="text-indigo-100/70">Polaroid aesthetic, neon memories, and prime pop anthems.</p>
                <span class="absolute bottom-6 left-8 text-sm font-semibold text-pink-500">Enter Portal →</span>
            </button>
        </div>
    </div>

    <!-- SCREEN 2: DYNAMIC DASHBOARD -->
    <div id="dashboard-screen" class="hidden min-h-screen p-4 md:p-8 flex flex-col">
        <nav class="max-w-6xl w-full mx-auto flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <button onclick="goBack()" class="text-sm font-semibold uppercase tracking-wider bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-all">
                ← Switch Era
            </button>
            <span class="text-xs uppercase tracking-widest font-black opacity-60">Smart Link Search Engine v10.0</span>
        </nav>

        <main class="max-w-6xl w-full mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 flex-grow animate-fade">
            <!-- Title Box -->
            <div id="card-title" class="md:col-span-1 p-8 rounded-3xl border backdrop-blur-md flex flex-col justify-between">
                <div>
                    <span class="text-xs font-bold tracking-widest uppercase opacity-60">Active Theme</span>
                    <h1 id="theme-title" class="text-4xl font-extrabold mt-2 mb-4 tracking-tight"></h1>
                    <p id="theme-subtitle" class="opacity-80 leading-relaxed text-sm"></p>
                </div>
            </div>

            <!-- Playlist Box -->
            <div id="card-playlist" class="md:col-span-2 p-8 rounded-3xl border backdrop-blur-md">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold tracking-tight">Generated Tracks</h2>
                    <p class="text-xs opacity-60 mt-0.5">Click any track to search and play instantly on Spotify</p>
                </div>

                <!-- Tracks Container -->
                <div id="track-list" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <script>
        const MOODS = {
            bollywood: {
                title: "Y2K Desi Romance",
                subtitle: "Raindrops, strings, and intense poet energy",
                bgClass: ["from-amber-950", "via-stone-900", "to-red-950", "text-amber-100"],
                cardClass: "bg-amber-950/30 border-amber-500/30 text-amber-200",
                songs: [
                    { title: "Pehla Nasha Pehla Khumar", meta: "Jo Jeeta Wohi Sikandar" },
                    { title: "Subhanallah", meta: "Yeh Jawaani Hai Deewani" },
                    { title: "Darkhaast", meta: "Shivaay" },
                    { title: "Koi Mil Gaya", meta: "Kuch Kuch Hota Hai" },
                    { title: "Dooriyan", meta: "Love Aaj Kal" }
                ]
            },
            hollywood: {
                title: "2012 Polaroid Nostalgia",
                subtitle: "Midnight drives, fairy lights, and teenage dreams",
                bgClass: ["from-indigo-950", "via-slate-900", "to-pink-950", "text-indigo-100"],
                cardClass: "bg-indigo-950/30 border-pink-500/30 text-indigo-200",
                songs: [
                    { title: "Love Story", meta: "Taylor Swift" },
                    { title: "What Makes You Beautiful", meta: "One Direction" },
                    { title: "You Belong With Me", meta: "Taylor Swift" },
                    { title: "Night Changes", meta: "One Direction" },
                    { title: "Enchanted", meta: "Taylor Swift" }
                ]
            }
        };

        let currentActiveMoodKey = null;

        function switchMood(moodKey) {
            currentActiveMoodKey = moodKey;
            const current = MOODS[moodKey];
            
            document.body.className = `bg-gradient-to-br ${current.bgClass.join(' ')} min-h-screen font-sans transition-all duration-700 pb-12`;

            document.getElementById('theme-title').innerText = current.title;
            document.getElementById('theme-subtitle').innerText = current.subtitle;

            document.getElementById('card-title').className = `p-8 rounded-3xl border backdrop-blur-md flex flex-col justify-between ${current.cardClass}`;
            document.getElementById('card-playlist').className = `md:col-span-2 p-8 rounded-3xl border backdrop-blur-md ${current.cardClass}`;

            const trackListContainer = document.getElementById('track-list');
            trackListContainer.innerHTML = '';
            current.songs.forEach((song, idx) => {
                const searchQuery = encodeURIComponent(`${song.title} ${song.meta}`);
                const spotifySearchUrl = `https://open.spotify.com/search/${searchQuery}`;

                trackListContainer.innerHTML += `
                    <a href="${spotifySearchUrl}" target="_blank" class="group flex items-center justify-between p-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/0 hover:border-white/10 transition-all cursor-pointer block no-underline text-white">
                        <div class="flex items-center gap-4">
                            <span class="w-6 text-center font-bold text-sm opacity-60">
                                ${String(idx + 1).padStart(2, '0')}
                            </span>
                            <div>
                                <h4 class="font-semibold group-hover:text-green-400 transition-colors">${song.title}</h4>
                                <p class="text-xs opacity-60 mt-0.5">${song.meta}</p>
                            </div>
                        </div>
                        <div class="text-xs uppercase tracking-wider opacity-40 group-hover:opacity-100 transition-opacity flex items-center gap-2 text-green-400">
                            <span>Search & Play</span> ↗
                        </div>
                    </a>
                `;
            });

            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
        }

        function goBack() {
            document.body.className = "bg-slate-950 text-white min-h-screen font-sans pb-12";
            document.getElementById('splash-screen').classList.remove('hidden');
            document.getElementById('dashboard-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
